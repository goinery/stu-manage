<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>选课中心</title>
    <link href="../../static/css/index.css" type="text/css" rel="stylesheet"/>
    <link rel="stylesheet" href="../../static/layui/css/layui.css"/>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">
    <!--头部导航栏-->
    <div id="head" th:include="common/header :: common_head(user=${session.user})"></div>
    <!--左边菜单栏-->
    <div id="left_column" th:include="common/left_column :: left_column(menuList=${session.menuList})"></div>
    <!-- 内容主体区域 -->
    <div class="layui-body">
        <div style="padding: 15px;">
            <div class="college_cloum">
                选课中心
                <hr>
                <!-- 选课阶段提示 -->
                <div id="stageInfo" class="layui-card" style="margin-bottom:10px;">
                    <div class="layui-card-header" style="color:#FF5722;font-weight:bold;">当前选课阶段</div>
                    <div class="layui-card-body" id="stageContent" style="padding:10px;">
                        正在获取选课阶段信息...
                    </div>
                </div>
                <!-- 三个Tab -->
                <div class="layui-tab layui-tab-brief" lay-filter="courseTab">
                    <ul class="layui-tab-title">
                        <li class="layui-this">推荐选课</li>
                        <li>方案内选课</li>
                        <li>方案外选课</li>
                    </ul>
                    <div class="layui-tab-content">
                        <!-- 推荐选课Tab -->
                        <div class="layui-tab-item layui-show">
                            <blockquote class="layui-elem-quote" style="font-size:14px;color:#666;margin-bottom:10px;">
                                推荐选课：展示所在行政班方案内（排除《体育Ⅱ-Ⅳ》）的推荐课程，点击【选课志愿】后，需校验上课时间冲突与剩余容量，通过则选课成功。
                            </blockquote>
                            <table class="layui-hide" id="recommendCourse" lay-filter="recommendCourse"></table>
                        </div>
                        <!-- 方案内选课Tab -->
                        <div class="layui-tab-item">
                            <blockquote class="layui-elem-quote" style="font-size:14px;color:#666;margin-bottom:10px;">
                                方案内选课：支持选择本专业其他学期课程，需控制阶段开放（第三、四阶段）。
                            </blockquote>
                            <table class="layui-hide" id="planCourse" lay-filter="planCourse"></table>
                        </div>
                        <!-- 方案外选课Tab -->
                        <div class="layui-tab-item">
                            <blockquote class="layui-elem-quote" style="font-size:14px;color:#666;margin-bottom:10px;">
                                方案外选课：支持跨专业选课以扩充知识面，需控制阶段开放（第三、四阶段）。
                            </blockquote>
                            <table class="layui-hide" id="outsideCourse" lay-filter="outsideCourse"></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../../static/layui/layui.all.js"/>
</body>
<script th:inline="javascript">
    layui.use(['table', 'layer', 'element'], function(){
        var layer = layui.layer,
            table = layui.table,
            element = layui.element,
            $ = layui.jquery;

        var studentId = [[${session.user.id}]];
        var currentStage = null;

        //获取选课阶段信息
        $.ajax({
            url: '/student/selectionStage',
            method: 'get',
            dataType: 'json',
            success: function(res){
                if(res.code === 200 && res.data){
                    currentStage = res.data;
                    var html = '<div><b>阶段名称：</b>' + currentStage.stageName + '</div>';
                    html += '<div><b>开放时间：</b>' + formatTime(currentStage.startDate) + ' 至 ' + formatTime(currentStage.endDate) + '</div>';
                    html += '<div style="margin-top:5px;">';
                    html += '<span style="margin-right:15px;"><b>推荐选课：</b>' + (currentStage.allowRecommend === '1' ? '<span style="color:#5FB878">开放</span>' : '<span style="color:#FF5722">未开放</span>') + '</span>';
                    html += '<span style="margin-right:15px;"><b>方案内选课：</b>' + (currentStage.allowPlan === '1' ? '<span style="color:#5FB878">开放</span>' : '<span style="color:#FF5722">未开放</span>') + '</span>';
                    html += '<span><b>方案外选课：</b>' + (currentStage.allowOutside === '1' ? '<span style="color:#5FB878">开放</span>' : '<span style="color:#FF5722">未开放</span>') + '</span>';
                    html += '</div>';
                    $('#stageContent').html(html);
                } else {
                    $('#stageContent').html('<span style="color:#FF5722;font-weight:bold;">当前不在选课时间段内，无法进行选课操作</span>');
                }
            },
            error: function(){
                $('#stageContent').html('<span style="color:#FF5722;">获取选课阶段信息失败</span>');
            }
        });

        function formatTime(ts){
            if(!ts) return '--';
            var d = new Date(ts);
            return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
        }

        //列定义
        var cols = [[
            {field:'courseName', title:'课程名称', width:160},
            {field:'collegeName', title:'学院名称', width:160},
            {field:'teacherName', title:'授课教师', width:100},
            {field:'credits', title:'学分', width:70},
            {field:'classDate', title:'上课时间', width:220},
            {field:'classPlace', title:'上课地点', width:160},
            {field:'optional', title:'可选人数', width:90},
            {field:'selected', title:'已选人数', width:90},
            {templet: function(d){ return d.optional > d.selected ? '<span style="color:#5FB878">有余额</span>' : '<span style="color:#FF5722">已满</span>'; }, title:'剩余容量', width:90},
            {templet: detailBtn, title:'课程详情', align:'center', width:100},
            {templet: null, title:'操作', align:'center', width:120}
        ]];

        //推荐选课表格
        var recommendTable = table.render({
            elem: '#recommendCourse',
            url:'/student/recommendCourseList',
            cols: [[
                {field:'courseName', title:'课程名称', width:160},
                {field:'collegeName', title:'学院名称', width:160},
                {field:'teacherName', title:'授课教师', width:100},
                {field:'credits', title:'学分', width:70},
                {field:'classDate', title:'上课时间', width:220},
                {field:'classPlace', title:'上课地点', width:160},
                {field:'optional', title:'可选人数', width:90},
                {field:'selected', title:'已选人数', width:90},
                {templet: function(d){ return (d.optional - d.selected) > 0 ? '<span style="color:#5FB878">有余额(' + (d.optional - d.selected) + ')</span>' : '<span style="color:#FF5722">已满</span>'; }, title:'剩余容量', width:100},
                {templet: detailBtn, title:'课程详情', align:'center', width:100},
                {templet: function(d){ return selectBtn(d, 'recommend'); }, title:'操作', align:'center', width:120}
            ]]
        });

        //方案内选课表格
        var planTable = table.render({
            elem: '#planCourse',
            url:'/student/planCourseList',
            cols: [[
                {field:'courseName', title:'课程名称', width:160},
                {field:'collegeName', title:'学院名称', width:160},
                {field:'teacherName', title:'授课教师', width:100},
                {field:'academicYear', title:'学年', width:120},
                {field:'credits', title:'学分', width:70},
                {field:'classDate', title:'上课时间', width:220},
                {field:'classPlace', title:'上课地点', width:160},
                {field:'optional', title:'可选人数', width:90},
                {field:'selected', title:'已选人数', width:90},
                {templet: function(d){ return (d.optional - d.selected) > 0 ? '<span style="color:#5FB878">有余额</span>' : '<span style="color:#FF5722">已满</span>'; }, title:'剩余容量', width:90},
                {templet: detailBtn, title:'课程详情', align:'center', width:100},
                {templet: function(d){ return selectBtn(d, 'plan'); }, title:'操作', align:'center', width:120}
            ]]
        });

        //方案外选课表格
        var outsideTable = table.render({
            elem: '#outsideCourse',
            url:'/student/outsideCourseList',
            cols: [[
                {field:'courseName', title:'课程名称', width:160},
                {field:'collegeName', title:'学院名称', width:160},
                {field:'teacherName', title:'授课教师', width:100},
                {field:'credits', title:'学分', width:70},
                {field:'classDate', title:'上课时间', width:220},
                {field:'classPlace', title:'上课地点', width:160},
                {field:'optional', title:'可选人数', width:90},
                {field:'selected', title:'已选人数', width:90},
                {templet: function(d){ return (d.optional - d.selected) > 0 ? '<span style="color:#5FB878">有余额</span>' : '<span style="color:#FF5722">已满</span>'; }, title:'剩余容量', width:90},
                {templet: detailBtn, title:'课程详情', align:'center', width:100},
                {templet: function(d){ return selectBtn(d, 'outside'); }, title:'操作', align:'center', width:120}
            ]]
        });

        function detailBtn(d){
            return '<button type="button" class="layui-btn layui-btn-sm" onclick="openClassDetail(\''+ escapeHtml(d.remark || '暂无说明') + '\')">详情</button>';
        }

        function selectBtn(d, type){
            if(d.type == "1"){
                return '<button type="button" class="layui-btn layui-btn-sm layui-btn-danger" onclick="courseDrop(\''+ d.id +'\',\''+ type +'\')">退课</button>';
            }
            if(d.optional <= d.selected){
                return '<button type="button" class="layui-btn layui-btn-sm layui-btn-disabled" disabled>已满</button>';
            }
            return '<button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="courseSelection(\''+ d.id +'\',\''+ type +'\')">选课志愿</button>';
        }

        function escapeHtml(text){
            if(!text) return '';
            return text.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, " ");
        }

        //选课
        window.courseSelection = function(id, type){
            var data = {
                'courseId': id,
                'type': '0',
                'studentId': studentId,
                'selectionType': type
            };
            data = JSON.stringify(data);
            $.ajax({
                url: '/student/courseSelection',
                method: 'post',
                data: data,
                contentType: "application/json;charset=utf-8",
                traditional: true,
                dataType: 'text',
                success: function (res) {
                    res = JSON.parse(res);
                    if(res.code == 201){
                        layer.msg(res.message, {icon: 2});
                    }else{
                        layer.msg(res.message || '选课成功', {icon: 1}, function(){
                            recommendTable.reload();
                            planTable.reload();
                            outsideTable.reload();
                        });
                    }
                },
                error: function(){
                    layer.msg('服务器连接失败', {icon: 2});
                }
            });
        };

        //课程详情
        window.openClassDetail = function (remark) {
            layer.open({
                type: 1,
                title: '课程详情',
                area: ['600px', '400px'],
                content: '<div style="padding:15px;line-height:28px;overflow-y:auto;max-height:350px;">' + remark + '</div>'
            });
        };

        //退课
        window.courseDrop = function(id, type){
            layer.confirm('确定要退选该课程吗？退课后需重新选课。', {icon: 3, title:'退课确认'}, function(index){
                layer.close(index);
                var data = {
                    'courseId': id,
                    'type': '1',
                    'studentId': studentId,
                    'selectionType': type
                };
                data = JSON.stringify(data);
                $.ajax({
                    url: '/student/courseDrop',
                    method: 'post',
                    data: data,
                    contentType: "application/json;charset=utf-8",
                    traditional: true,
                    dataType: 'text',
                    success: function (res) {
                        res = JSON.parse(res);
                        if(res.code == 201){
                            layer.msg(res.message, {icon: 2});
                        }else{
                            layer.msg(res.message || '退课成功', {icon: 1}, function(){
                                recommendTable.reload();
                                planTable.reload();
                                outsideTable.reload();
                            });
                        }
                    },
                    error: function(){
                        layer.msg('服务器连接失败', {icon: 2});
                    }
                });
            });
        };

        //Tab切换时重新渲染表格
        element.on('tab(courseTab)', function(data){
            if(data.index === 0){
                recommendTable.reload();
            } else if(data.index === 1){
                planTable.reload();
            } else if(data.index === 2){
                outsideTable.reload();
            }
        });

    });
</script>
</html>
