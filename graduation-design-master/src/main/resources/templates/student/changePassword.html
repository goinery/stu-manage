<!DOCTYPE html>
<html lang="zh"
      xmlns:th="http://www.thymeleaf.org"
      xmlns="http://www.w3.org/1999/xhtml"
>
<head>
    <meta charset="UTF-8"/>
    <title>安全设置</title>
    <link href="../../static/css/index.css" type="text/css" rel="stylesheet"/>
    <link rel="stylesheet" href="../../static/layui/css/layui.css"/>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">
    <!--头部导航栏-->
    <div id="head" th:include="common/header :: common_head(user=${session.user})"></div>
    <!--左边菜单栏-->
    <div id="left_column" th:include="common/left_column :: left_column(menuList=${session.menuList})"></div>
    <!-- 内容主体区域 -->
    <div class="layui-body">
        <div style="padding: 15px;">
            <div class="index_cloum">
                <blockquote class="layui-elem-quote">
                    安全设置 - 修改密码
                </blockquote>
                <div class="layui-card">
                    <div class="layui-card-header">修改登录密码</div>
                    <div class="layui-card-body" style="padding: 20px;">
                        <form class="layui-form" action="" lay-filter="passwordForm">
                            <div class="layui-form-item">
                                <label class="layui-form-label">当前密码</label>
                                <div class="layui-input-block">
                                    <input type="password" name="oldPassword" id="oldPassword" lay-verify="required" lay-reqtext="请输入当前密码" placeholder="请输入当前密码" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">新密码</label>
                                <div class="layui-input-block">
                                    <input type="password" name="newPassword" id="newPassword" lay-verify="required" lay-reqtext="请输入新密码" placeholder="请输入新密码（至少6位）" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">确认新密码</label>
                                <div class="layui-input-block">
                                    <input type="password" name="confirmPassword" id="confirmPassword" lay-verify="required" lay-reqtext="请确认新密码" placeholder="请再次输入新密码" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-input-block">
                                    <button type="button" class="layui-btn" id="changePasswordBtn">确认修改</button>
                                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="../../static/layui/layui.all.js"></script>
<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.jquery;

        $('#changePasswordBtn').on('click', function(){
            var oldPassword = $('#oldPassword').val();
            var newPassword = $('#newPassword').val();
            var confirmPassword = $('#confirmPassword').val();

            if(!oldPassword || oldPassword === ''){
                layer.msg('请输入当前密码');
                return;
            }
            if(!newPassword || newPassword === ''){
                layer.msg('请输入新密码');
                return;
            }
            if(newPassword.length < 6){
                layer.msg('新密码长度不能少于6位');
                return;
            }
            if(newPassword !== confirmPassword){
                layer.msg('两次输入的新密码不一致');
                return;
            }

            var data = JSON.stringify({
                'oldPassword': oldPassword,
                'newPassword': newPassword
            });

            $.ajax({
                url: '/user/changeStudentPassword',
                method: 'post',
                data: data,
                contentType: "application/json;charset=utf-8",
                dataType: 'json',
                success: function(res){
                    if(res.code === 200){
                        layer.msg('密码修改成功，请重新登录', {icon: 1}, function(){
                            window.location.href = '/logout';
                        });
                    } else {
                        layer.msg(res.message || '密码修改失败', {icon: 2});
                    }
                },
                error: function(){
                    layer.msg('服务器连接失败，请稍后重试', {icon: 2});
                }
            });
        });
    });
</script>
</html>
