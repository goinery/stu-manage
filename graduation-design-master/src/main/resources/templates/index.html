<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns="http://www.w3.org/1999/xhtml"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>首页</title>
    <link href="../static/css/index.css" type="text/css" rel="stylesheet"/>
    <link rel="stylesheet" href="../static/layui/css/layui.css"/>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">
    <!--头部导航栏-->
    <div id="head" th:include="common/header :: common_head(user=${session.user})"></div>
    <!--左边菜单栏-->
    <div id="left_column" th:include="common/left_column :: left_column(menuList=${session.menuList})"></div>
    <!-- 内容主体区域 -->
    <div class="layui-body">
        <div style="padding: 15px;">
            <div class="index_cloum">
                <blockquote class="layui-elem-quote">
                    <span class="login_name"> [[${session.user.username}]]</span>
                    <span th:if="${userType} eq '1'">管理员</span>
                    <span th:if="${userType} eq '2'">老师</span>
                    <span th:if="${userType} eq '3'">同学</span>
                    ，你好！ 欢迎登录学生选课管理系统
                </blockquote>

                <!-- 学生端统计卡片 -->
                <div th:if="${userType} eq '3'" class="layui-row layui-col-space15" style="margin-bottom:15px;">
                    <div class="layui-col-md4">
                        <div class="layui-card">
                            <div class="layui-card-header">已选课程数</div>
                            <div class="layui-card-body" style="font-size:28px; font-weight:bold; color:#1E9FFF; text-align:center;">
                                <span th:text="${courseCount} ?: '0'">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md4">
                        <div class="layui-card">
                            <div class="layui-card-header">已获得学分</div>
                            <div class="layui-card-body" style="font-size:28px; font-weight:bold; color:#FFB800; text-align:center;">
                                <span th:text="${creditsCount} ?: '0'">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md4">
                        <div class="layui-card">
                            <div class="layui-card-header">当前学年</div>
                            <div class="layui-card-body" style="font-size:28px; font-weight:bold; color:#009688; text-align:center;">
                                <span th:text="${academicYear} ?: '--'">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 教师端统计卡片 -->
                <div th:if="${userType} eq '2'" class="layui-row layui-col-space15" style="margin-bottom:15px;">
                    <div class="layui-col-md6">
                        <div class="layui-card">
                            <div class="layui-card-header">所属学院</div>
                            <div class="layui-card-body" style="font-size:22px; font-weight:bold; color:#1E9FFF; text-align:center;">
                                <span th:text="${collegeName} ?: '--'">--</span>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md6">
                        <div class="layui-card">
                            <div class="layui-card-header">当前学年</div>
                            <div class="layui-card-body" style="font-size:22px; font-weight:bold; color:#009688; text-align:center;">
                                <span th:text="${academicYear} ?: '--'">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 管理员端统计卡片 -->
                <div th:if="${userType} eq '1'" class="layui-row layui-col-space15" style="margin-bottom:15px;">
                    <div class="layui-col-md4">
                        <div class="layui-card">
                            <div class="layui-card-header">系统角色</div>
                            <div class="layui-card-body" style="font-size:22px; font-weight:bold; color:#1E9FFF; text-align:center;">
                                系统管理员
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 公告信息 -->
                <blockquote class="layui-elem-quote">
                    <div class="notice_title"> [[${information != null ? information.title : '暂无公告'}]]</div>
                    <div class="notice_content" id="content">

                    </div>
                    <div class="notice_date">
                        <span th:if="${information != null and information.publishDate != null}" th:text="${#dates.format(information.publishDate, 'yyyy-MM-dd')}"></span>
                        <span th:if="${information == null or information.publishDate == null}">--</span>
                    </div>
                </blockquote>
            </div>
        </div>
    </div>
</div>
</body>
<script src="../static/layui/layui.all.js"></script>
<script th:inline="javascript">
    layui.use('layer',function(){
        var layer = layui.layer,
            $ = layui.jquery;
        layer.ready(function(){
            var content = [[${information != null ? information.content : ''}]];
            if(content){
                document.getElementById('content').innerHTML = content;
            } else {
                document.getElementById('content').innerHTML = '<span style="color:#999;">暂无公告内容</span>';
            }
        });
    });
</script>
</html>
