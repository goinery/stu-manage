<!DOCTYPE html>
<html lang="zh"
      xmlns:th="http://www.thymeleaf.org"
      xmlns="http://www.w3.org/1999/xhtml"
>
<head>
    <meta charset="UTF-8"/>
    <title>基本信息</title>
    <link href="../../static/css/index.css" type="text/css" rel="stylesheet"/>
    <link rel="stylesheet" href="../../static/layui/css/layui.css"/>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">
    <!--头部导航栏-->
    <div id="head" th:include="common/header :: common_head(user=${session.user})"></div>
    <!--左边菜单栏-->
    <div id="left_column" th:include="common/left_column :: left_column(menuList=${session.menuList})"></div>
    <!-- 内容主体区域 -->
    <div class="layui-body">
        <div style="padding: 15px;">
            <div class="index_cloum">
                <blockquote class="layui-elem-quote">
                    基本信息
                </blockquote>
                <div class="layui-card">
                    <div class="layui-card-header">管理员资料</div>
                    <div class="layui-card-body" style="padding: 20px;">
                        <form class="layui-form" action="" lay-filter="profileForm">
                            <div class="layui-form-item">
                                <label class="layui-form-label">登录名</label>
                                <div class="layui-input-block">
                                    <input type="text" name="loginName" th:value="${manageUser.loginName}" class="layui-input" disabled>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">用户名</label>
                                <div class="layui-input-block">
                                    <input type="text" name="username" id="username" th:value="${manageUser.username}" lay-verify="required" lay-reqtext="请输入用户名" placeholder="请输入用户名" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">角色</label>
                                <div class="layui-input-block">
                                    <input type="text" name="roleName" th:value="${manageUser.roleName != null ? manageUser.roleName : '系统管理'}" class="layui-input" disabled>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">创建时间</label>
                                <div class="layui-input-block">
                                    <input type="text" name="createDate" th:value="${manageUser.createDate != null ? #dates.format(manageUser.createDate, 'yyyy-MM-dd HH:mm:ss') : '--'}" class="layui-input" disabled>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-input-block">
                                    <button type="button" class="layui-btn" id="saveProfileBtn">保存修改</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="../../static/layui/layui.all.js"></script>
<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.jquery;

        $('#saveProfileBtn').on('click', function(){
            var username = $('#username').val();

            if(!username || username.trim() === ''){
                layer.msg('用户名不能为空');
                return;
            }

            var data = JSON.stringify({
                'username': username
            });

            $.ajax({
                url: '/user/updateManageProfile',
                method: 'post',
                data: data,
                contentType: "application/json;charset=utf-8",
                dataType: 'json',
                success: function(res){
                    if(res.code === 200){
                        layer.msg('修改成功', {icon: 1});
                    } else {
                        layer.msg(res.message || '修改失败', {icon: 2});
                    }
                },
                error: function(){
                    layer.msg('服务器连接失败，请稍后重试', {icon: 2});
                }
            });
        });
    });
</script>
</html>
